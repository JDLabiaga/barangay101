<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Brgy. Fundacion</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="header-content">
        <img src="logo.png" alt="Barangay Fundacion Logo" class="main-logo">
        <div class="header-text">
            <h1>Barangay Fundacion</h1>
            <p>Official Information Portal | Dueñas, Iloilo</p>
        </div>
    </div>
</header>
    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="news.html">News</a>
            <a href="contact.html">Contact</a>
            </div>
        <div class="nav-search">
            <input type="text" placeholder="Search services..." style="margin:0; padding:5px 10px; width:150px; border-radius:15px; border:none;">
        </div>
    </nav>

    <div class="container">
        <h2>Get in Touch</h2>
        <p><strong>Address:</strong> Barangay Fundacion, Dueñas, Iloilo, Philippines</p>
        
        <form id="contactForm">
            <label>Name:</label>
            <input type="text" placeholder="Your Name" required>
            
            <label>Email:</label>
            <input type="email" placeholder="Your Email" required>
            
            <label>Message:</label>
            <textarea rows="5" placeholder="How can we help you?"></textarea>
            
            <button type="submit">Send Message</button>
        </form>
    </div>
<footer>
    <img src="logo.png" alt="Brgy Logo" class="footer-logo">
    <p>&copy; 2026 Barangay Fundacion. All Rights Reserved.</p>
    <p>Unity • Transparency • Progress</p>
</footer>
</body>
</html>
